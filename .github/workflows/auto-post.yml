name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *" # 매일 01:20 UTC (KST 10:20)

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate posts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

          SITE_NAME: MingMong
          SITE_URL: https://mingmonglife.com

          POSTS_PER_RUN: 1
          MIN_CHARS: 2500

          IMG_COUNT: 4
          MAX_IMAGE_ATTEMPTS: 200
          MIN_IMAGE_BYTES: 80000

          MODEL: gpt-4o-mini
          HTTP_TIMEOUT: 30
        run: |
          python tools/auto_post.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto post" || echo "No changes to commit"
          git push
