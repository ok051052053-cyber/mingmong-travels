name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *" # 매일 01:20 UTC (KST 10:20)

permissions:
  contents: write

concurrency:
  group: auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate post (HTML + Unsplash only)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          SITE_NAME: MingMong
          SITE_URL: https://mingmonglife.com
          POSTS_PER_RUN: "1"
          MIN_CHARS: "3500"
          MODEL: "gpt-4o-mini"

          UNSPLASH_MIN_WIDTH: "2000"
          UNSPLASH_MIN_HEIGHT: "1200"
          UNSPLASH_MIN_LIKES: "60"
          UNSPLASH_PER_PAGE: "30"

          MAX_KEYWORD_TRIES: "12"
          MAX_GENERATE_ATTEMPTS: "3"

          TITLE_SIM_THRESHOLD: "0.88"
          KEYWORD_SIM_THRESHOLD: "0.82"

          AUTO_KEYWORD_BATCH: "24"
          MIN_KEYWORD_POOL: "18"

          CLUSTER_MODE: "1"
          CLUSTER_BATCH: "12"
          CLUSTER_ROTATION_WINDOW: "18"

          PILLAR_INTERVAL: "8"
          GOOGLE_SUGGEST_ENABLED: "1"
          GOOGLE_SUGGEST_MAX_SEEDS: "8"
          GOOGLE_SUGGEST_PER_QUERY: "8"
          RELATED_POST_LIMIT: "4"
        run: |
          python tools/auto_post.py

      - name: Build sitemap
        env:
          SITE_URL: https://mingmonglife.com
        run: |
          python tools/build.py

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto post"
          git pull --rebase origin main
          git push origin HEAD:main
